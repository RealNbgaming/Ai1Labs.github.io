<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ai1 - Intelligent AI Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --ai1-blue: #0066ff;
            --ai1-purple: #6c5ce7;
            --ai1-pink: #ec4899;
            --ai1-glow: 0 0 30px rgba(0, 102, 255, 0.3);
            --ai1-gradient: linear-gradient(135deg, #0066ff, #6c5ce7, #ec4899);
            
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --card-bg: #ffffff;
            --code-bg: #f1f5f9;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            --radius-2xl: 2rem;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-sidebar: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --hover-bg: #334155;
            --card-bg: #1e293b;
            --code-bg: #0f172a;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            height: 100%;
            border-right: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--ai1-gradient);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .ai1-icon {
            width: 48px;
            height: 48px;
            background: var(--ai1-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .ai1-icon::before { content: 'Ai'; font-size: 20px; }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            background: var(--ai1-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            width: 100%;
            padding: 14px 20px;
            background: var(--ai1-gradient);
            border: none;
            border-radius: var(--radius-xl);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .chat-history { flex-grow: 1; overflow-y: auto; padding: 20px; }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border-color); }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: var(--radius-lg);
            background-color: var(--hover-bg);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--ai1-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-primary);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--ai1-gradient);
            color: white;
        }

        .message-content { flex-grow: 1; padding-top: 8px; font-size: 15px; line-height: 1.7; }

        .chat-input-container {
            padding: 24px 32px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background-color: var(--bg-primary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            display: flex;
            border-radius: var(--radius-xl);
            border: 2px solid var(--border-color);
            background-color: var(--card-bg);
        }

        .input-wrapper input {
            width: 100%;
            padding: 18px 24px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            outline: none;
        }

        #sendButton {
            padding: 0 20px;
            background: transparent;
            border: none;
            color: var(--ai1-blue);
            cursor: pointer;
            font-size: 20px;
        }

        .welcome-message { text-align: center; max-width: 800px; margin: 40px auto; }
        .suggestion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .suggestion-card { border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; cursor: pointer; }
        
        /* Loading Animation */
        .streaming-indicator { display: flex; gap: 5px; padding: 10px 0; }
        .streaming-dot { width: 8px; height: 8px; background: var(--ai1-blue); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .generated-image { width: 100%; border-radius: 10px; margin-top: 10px; }
        .disclaimer { font-size: 12px; text-align: center; margin-top: 10px; color: var(--text-secondary); }
    </style>
</head>
<body data-theme="light">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="ai1-icon"></div>
                    <div class="logo-text">Ai1</div>
                </div>
                <button class="new-chat-btn" onclick="location.reload()">
                    <i class="fas fa-plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="chat-history"></div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-name">Guest User</div>
                </div>
            </div>
        </aside>

        <main class="chat-container">
            <div class="chat-header">
                <div class="logo-text">Ai1 Assistant</div>
                <button id="themeToggle" style="background:none; border:none; cursor:pointer; font-size:20px;">
                    <i class="fas fa-moon"></i>
                </button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <h1>Welcome to Ai1</h1>
                    <p>Created by Noe Benitez</p>
                    <div class="suggestion-grid">
                        <div class="suggestion-card" onclick="setAndSend('Make a picture of a space robot')">Generate Image</div>
                        <div class="suggestion-card" onclick="setAndSend('Who created you?')">Who made you?</div>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask Ai1 anything...">
                    <button id="sendButton"><i class="fas fa-paper-plane"></i></button>
                </div>
                <p class="disclaimer">⚡ Powered by Ai1 Labs</p>
            </div>
        </main>
    </div>

    <script>
        const AI1_API_KEY = "AIzaSyAQJJ8_P0oSL73-9DGm43en7gA_NYU0VV4"; // Replace with your actual secure key later
        const AI1_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI1_API_KEY}`;

        const CREATOR_RESPONSES = {
            'who made you': '### 👤 Created by Noe Benitez!\n\n**Noe Benitez** is my creator and the founder of **Ai1 Labs**! 🎉',
            'who is your creator': '### 👤 Noe Benitez created me!\n\nHe is the founder of Ai1 Labs.',
            'noe benitez': '### 👤 About Noe Benitez\n\nNoe Benitez is the founder of Ai1 Labs and the lead developer behind my intelligence! 🏆'
        };

        async function getAi1Response(prompt) {
            const lower = prompt.toLowerCase();
            
            // 1. Check Creator Answers
            for (let key in CREATOR_RESPONSES) {
                if (lower.includes(key)) return CREATOR_RESPONSES[key];
            }

            // 2. Check for Image Requests
            if (lower.includes('picture') || lower.includes('image')) {
                const cleanPrompt = prompt.replace(/make|image|picture|of/gi, '').trim();
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanPrompt)}?width=512&height=512&nologo=true`;
                return `### 🎨 Image Generated:\n<img src="${imgUrl}" class="generated-image">`;
            }

            // 3. API Call
            try {
                const response = await fetch(AI1_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) {
                return "⚠️ Connection error. Please check your API key.";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const chatBox = document.getElementById('chatMessages');
            if (document.querySelector('.welcome-message')) document.querySelector('.welcome-message').remove();

            // Add User Msg
            chatBox.innerHTML += `<div class="message"><div class="message-avatar">U</div><div class="message-content">${text}</div></div>`;
            input.value = '';

            // Add Loading
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div class="message" id="${loadingId}"><div class="message-avatar">Ai</div><div class="message-content"><div class="streaming-indicator"><div class="streaming-dot"></div><div class="streaming-dot"></div><div class="streaming-dot"></div></div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // Get Response
            const reply = await getAi1Response(text);
            const loadingDiv = document.getElementById(loadingId);
            loadingDiv.querySelector('.message-content').innerHTML = marked.parse(reply);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setAndSend(val) {
            document.getElementById('userInput').value = val;
            sendMessage();
        }

        document.getElementById('sendButton').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        document.getElementById('themeToggle').addEventListener('click', () => {
            const body = document.body;
            const theme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', theme);
        });
    </script>
</body>
</html>
